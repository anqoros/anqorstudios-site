<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Anqor Studios</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.page { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; }
.card { background: #fff; border-radius: 12px; padding: 40px 44px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid #1a1a1a; }
.logo { height: 36px; }
.lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 2px; margin-top: 12px; }
.lbl:first-child { margin-top: 0; }
.val { font-size: 13px; font-weight: 700; }

h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.sub { font-size: 12px; color: #999; margin-bottom: 28px; }
.section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 8px; margin-top: 24px; }

table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #999; text-align: left; padding: 8px 10px; border-bottom: 1px solid #e8e8e8; }
td { padding: 10px; border-bottom: 1px solid #f2f2f2; font-size: 12px; }
.num { text-align: right; }

.totals { margin-left: auto; width: 300px; margin-top: 16px; }
.total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
.total-row.big { font-size: 16px; font-weight: 800; border-top: 2px solid #1a1a1a; margin-top: 8px; padding-top: 10px; }
.muted { color: #999; }

.pay-box { background: #f8f8f6; border-left: 3px solid #1a1a1a; border-radius: 0 8px 8px 0; padding: 18px 22px; margin-top: 24px; }
.pay-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 14px; }
.pay-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; }
.pay-row.hi { margin-top: 6px; padding-top: 10px; border-top: 1px solid #e0e0e0; }

.bank-box { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; padding: 16px 20px; margin-top: 16px; }
.bank-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #999; margin-bottom: 10px; }
.bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.bank-item .k { font-size: 9px; color: #aaa; margin-bottom: 2px; }
.bank-item .v { font-size: 12px; font-weight: 600; }

.status-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
.badge-paid { background: #f0faf5; color: #2e7d52; border: 1px solid #b8e8cc; }
.badge-unpaid { background: #fef9f0; color: #c8882a; border: 1px solid #f0d8a8; }

.topbar { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar-logo { font-size: 11px; font-weight: 800; color: #2e7d52; letter-spacing: 0.06em; }
.btn { background: #1a1a1a; color: #fff; border: none; padding: 9px 18px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-outline { background: transparent; color: #1a1a1a; border: 1px solid #ccc; }
.btn-outline:hover { background: #f5f5f5; }

#loading { text-align: center; padding: 80px; font-size: 14px; color: #999; }
#error   { text-align: center; padding: 80px; font-size: 14px; color: #c00; }

@media print {
  .topbar { display: none; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #e8e8e8; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">ANQOR STUDIOS</div>
  <button class="btn btn-outline" onclick="window.print()">Download PDF</button>
</div>

<div id="loading">Loading invoice…</div>
<div id="error" style="display:none"></div>
<div class="page" id="invoicePage" style="display:none"></div>

<script>
const AQ_URL = 'https://hmsaysnufuenadohfhpl.supabase.co';
const AQ_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhtc2F5c251ZnVlbmFkb2hmaHBsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMjM1MTUsImV4cCI6MjA5Mzc5OTUxNX0.OlEQgmohTXgnZ9nadizbhhBRO5FhiDTYy-AjGY-WL4w';
const sb = supabase.createClient(AQ_URL, AQ_KEY);

const slug = new URLSearchParams(location.search).get('slug');
const fmt  = n => Number(n).toLocaleString('en-AE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc  = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function load() {
  if (!slug) { showError('No invoice slug in URL.'); return; }
  const { data, error } = await sb.from('invoices').select('*').eq('slug', slug).single();
  if (error || !data) { showError('Invoice not found.'); return; }

  const inv = data.data;
  const isPaid = !!data.paid_at;
  document.title = (inv.invoice_number || 'Invoice') + ' — Anqor Studios';

  const items = (inv.items || []).map(i => `<tr>
    <td>${esc(i.description)}</td>
    <td class="num">${i.quantity}</td>
    <td class="num">AED ${fmt(i.unit_price_aed)}</td>
    <td class="num">AED ${fmt(i.total_aed)}</td>
  </tr>`).join('');

  document.getElementById('invoicePage').innerHTML = `
    <div class="card">
      <div class="header">
        <img src="anqor_logo.png" class="logo" alt="Anqor Studios" onerror="this.style.display='none'">
        <div style="text-align:right">
          <div class="lbl">Invoice Number</div><div class="val">${esc(inv.invoice_number||'')}</div>
          <div class="lbl">Date</div><div class="val">${esc(inv.date||'')}</div>
          <div class="lbl">Due Date</div><div class="val">${esc(inv.due_date||'')}</div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px">
        <div>
          <h1>Invoice</h1>
          <div class="sub">Anqor Studios L.L.C-FZ</div>
        </div>
        <span class="status-badge ${isPaid ? 'badge-paid' : 'badge-unpaid'}">${isPaid ? 'Paid' : 'Payment Due'}</span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px">
        <div>
          <div class="lbl">Bill To</div>
          <div style="font-size:13px;font-weight:600">${esc(inv.client_name||'')}</div>
          ${inv.client_email ? `<div style="font-size:12px;color:#888">${esc(inv.client_email)}</div>` : ''}
        </div>
        <div>
          <div class="lbl">From</div>
          <div style="font-size:13px;font-weight:600">Anqor Studios L.L.C-FZ</div>
          <div style="font-size:12px;color:#888">Meydan Grandstand, Dubai, UAE</div>
        </div>
      </div>

      <div class="section-label">Line Items</div>
      <table>
        <thead><tr><th>Description</th><th class="num">Qty</th><th class="num">Unit Price</th><th class="num">Total</th></tr></thead>
        <tbody>${items}</tbody>
      </table>

      <div class="totals">
        <div class="total-row"><span class="muted">Subtotal</span><span>AED ${fmt(inv.subtotal_aed)}</span></div>
        <div class="total-row"><span class="muted">VAT (${inv.vat_rate||5}%)</span><span>AED ${fmt(inv.vat_aed)}</span></div>
        <div class="total-row big"><span>Total Due</span><span>AED ${fmt(inv.total_aed)}</span></div>
      </div>

      <div class="pay-box">
        <div class="pay-title">Payment Breakdown</div>
        <div class="pay-row hi"><span>Due on signing</span><span style="font-weight:700">AED ${fmt(inv.advance_aed||0)}</span></div>
        <div class="pay-row" style="font-size:11px;color:#aaa;padding-left:8px"><span>${esc(inv.third_party_note||'')}</span></div>
        <div class="pay-row hi"><span>Balance on delivery</span><span style="font-weight:700">AED ${fmt(inv.balance_aed||0)}</span></div>
      </div>

      <div class="bank-box">
        <div class="bank-title">Bank Transfer Details</div>
        <div class="bank-grid">
          <div class="bank-item"><div class="k">Account Title</div><div class="v">Anqor Studios L.L.C-FZ</div></div>
          <div class="bank-item"><div class="k">Account Number</div><div class="v">3003731440000001</div></div>
          <div class="bank-item" style="grid-column:span 2"><div class="k">Address</div><div class="v">Meydan Grandstand, 6th Floor, Meydan Road, Nad Al Sheba, Dubai, UAE</div></div>
        </div>
        <div style="font-size:10px;color:#aaa;margin-top:10px">Please reference your invoice number on the transfer.</div>
      </div>

      ${inv.notes ? `<div class="section-label" style="margin-top:20px">Notes</div><p style="font-size:12px;color:#555;line-height:1.7">${esc(inv.notes)}</p>` : ''}
    </div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('invoicePage').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = msg;
}

load();
</script>
</body>
</html>
